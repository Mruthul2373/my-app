name: Deploy Tomcat App

on:
push:
branches:
- main

jobs:
deploy:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout Source
    uses: actions/checkout@v5

  - name: Setup Java 17
    uses: actions/setup-java@v5
    with:
      distribution: temurin
      java-version: '17'

  - name: Build Application
    run: mvn clean package

  - name: SonarQube Analysis
    run: |
      mvn clean verify sonar:sonar \
        -Dsonar.projectKey=my-app \
        -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
        -Dsonar.login=${{ secrets.SONAR_TOKEN }}

  - name: Configure SSH
    run: |
      mkdir -p ~/.ssh
      echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
      chmod 600 ~/.ssh/id_rsa
      ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

  - name: Upload WAR to EC2
    run: |
      scp target/my-app.war \
        ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/my-app.war

  - name: Deploy to Tomcat
    run: |
      ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
      sudo cp /tmp/my-app.war /opt/tomcat/webapps/my-app.war
      sudo rm -rf /opt/tomcat/webapps/my-app
      EOF
```
